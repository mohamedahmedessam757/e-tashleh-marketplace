# Shared static asset caching — include after e-tashleh-gzip.conf in frontend server {}

location = /fonts-extended.css {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

location = /robots.txt {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=86400" always;
}

location = /sitemap.xml {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=86400" always;
}

location = /llms.txt {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=86400" always;
    default_type text/plain;
}

location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri =404;
}

location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

location /fonts/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Access-Control-Allow-Origin "*" always;
    try_files $uri =404;
}

location ~* \.(png|jpg|jpeg|webp|ico|svg|gif|woff2|woff|ttf)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

location ~* \.(css|js|mjs)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

location / {
    try_files $uri $uri/ /index.html;
}
