# Shared static asset caching — include in both :80 and :443 server blocks
location = /robots.txt {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=86400";
}

location = /sitemap.xml {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=86400";
}

location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate";
    try_files $uri =404;
}

location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
}

location /fonts/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Access-Control-Allow-Origin "*";
    try_files $uri =404;
}

location ~* \.(png|jpg|jpeg|webp|ico|svg|gif|woff2|woff|ttf)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
}

location ~* \.(css|js|mjs)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
}

location / {
    try_files $uri $uri/ /index.html;
}
