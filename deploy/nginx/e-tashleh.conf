# HTTP first — certbot --nginx will add SSL automatically
# Install: cp to /etc/nginx/sites-available/e-tashleh

server {
    listen 80;
    listen [::]:80;
    server_name e-tashleh.net www.e-tashleh.net;

    root /var/www/e-tashleh/Frontend/dist;
    index index.html;

    client_max_body_size 35M;

    location ~* \.(png|jpg|jpeg|webp|ico|svg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.e-tashleh.net;

    client_max_body_size 35M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
