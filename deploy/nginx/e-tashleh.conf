# E-Tashleh — Frontend + NestJS API + WebSocket
# Install: /etc/nginx/sites-available/e-tashleh

# Redirect HTTP → HTTPS (after certbot, certbot may add these automatically)
server {
    listen 80;
    listen [::]:80;
    server_name e-tashleh.net www.e-tashleh.net api.e-tashleh.net;
    return 301 https://$host$request_uri;
}

# ── Frontend (React SPA) ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name e-tashleh.net www.e-tashleh.net;

    # certbot will inject ssl_certificate paths — or add manually after certbot
    # ssl_certificate /etc/letsencrypt/live/e-tashleh.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/e-tashleh.net/privkey.pem;

    root /var/www/e-tashleh/Frontend/dist;
    index index.html;

    client_max_body_size 35M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: serve API on same domain under /api (if you prefer not to use api subdomain)
    # location /api/ {
    #     rewrite ^/api/(.*)$ /$1 break;
    #     proxy_pass http://127.0.0.1:3000;
    #     include /etc/nginx/proxy_params;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }
}

# ── Backend API + Socket.io ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.e-tashleh.net;

    client_max_body_size 35M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
