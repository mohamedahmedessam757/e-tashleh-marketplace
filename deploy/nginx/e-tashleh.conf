# E-TASHLEH nginx — HTTP + HTTPS with identical cache rules
# Install: cp to /etc/nginx/sites-available/e-tashleh
# After certbot: ensure 443 block keeps include snippets/e-tashleh-static-cache.conf

# Gzip (enable brotli in nginx.conf if ngx_brotli module is installed)
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff2;

# Optional — uncomment if ngx_brotli is available:
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css application/json application/javascript image/svg+xml font/woff2;

map $sent_http_content_type $expires_type {
    default                    off;
    text/html                  epoch;
    text/css                   max;
    application/javascript     max;
    application/json           epoch;
    ~image/                    max;
    font/woff2                 max;
}

# --- HTTP → HTTPS redirect (frontend) ---
server {
    listen 80;
    listen [::]:80;
    server_name e-tashleh.net www.e-tashleh.net;
    return 301 https://$host$request_uri;
}

# --- HTTPS frontend ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name e-tashleh.net www.e-tashleh.net;

    # Certbot replaces these paths on the VPS:
    ssl_certificate     /etc/letsencrypt/live/e-tashleh.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/e-tashleh.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/e-tashleh/Frontend/dist;
    index index.html;
    client_max_body_size 35M;

    include /etc/nginx/snippets/e-tashleh-static-cache.conf;
}

# --- API (HTTP; add 443 block similarly if api uses TLS) ---
server {
    listen 80;
    listen [::]:80;
    server_name api.e-tashleh.net;

    client_max_body_size 35M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        gzip on;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.e-tashleh.net;

    ssl_certificate     /etc/letsencrypt/live/e-tashleh.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/e-tashleh.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 35M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
