# E-TASHLEH nginx — HTTP + HTTPS with cache + gzip
# Install:
#   sudo cp deploy/nginx/e-tashleh.conf /etc/nginx/sites-available/e-tashleh
#   sudo cp deploy/nginx/snippets/e-tashleh-*.conf /etc/nginx/snippets/
#   sudo ln -sf /etc/nginx/sites-available/e-tashleh /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# If gzip still missing on static JS, also add to /etc/nginx/nginx.conf inside http {}:
#   include /etc/nginx/snippets/e-tashleh-gzip.conf;

# --- HTTP → HTTPS redirect (frontend) ---
server {
    listen 80;
    listen [::]:80;
    server_name e-tashleh.net www.e-tashleh.net;
    return 301 https://$host$request_uri;
}

# --- HTTPS frontend ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name e-tashleh.net www.e-tashleh.net;

    ssl_certificate     /etc/letsencrypt/live/e-tashleh.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/e-tashleh.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/e-tashleh/Frontend/dist;
    index index.html;
    client_max_body_size 35M;

    include /etc/nginx/snippets/e-tashleh-gzip.conf;
    include /etc/nginx/snippets/e-tashleh-static-cache.conf;
}

# --- API HTTP → redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name api.e-tashleh.net;
    return 301 https://$host$request_uri;
}

# --- API HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.e-tashleh.net;

    ssl_certificate     /etc/letsencrypt/live/e-tashleh.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/e-tashleh.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 35M;

    include /etc/nginx/snippets/e-tashleh-gzip.conf;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
